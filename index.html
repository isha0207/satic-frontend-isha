<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Frontend Journey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">

</head>
<body>

<header class="header">
  <div class="container nav-container">
    <h1 class="logo">Your Name</h1>

    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <nav id="navMenu" class="nav">
      <a href="#">Home</a>
      <a href="#">Tasks</a>
      <a href="#">Journey</a>
      <a href="#">Contact</a>
    </nav>
  </div>
</header>

<main class="container">

  <!-- Find Tasks Section -->
  <section class="card">
    <h2>Find Your Tasks</h2>
    <div class="search-box">
      <input type="text" placeholder="Search content...">
      <button class="search-btn">🔍</button>
    </div>
  </section>

  <!-- Frontend Journey -->
  <section class="card">
    <h3>My Frontend Journey</h3>
    <ul>
      <li>Day 1: Setup & Deployment (Completed)</li>
    </ul>
  </section>

  <!-- Button Component System -->
  <section class="card">
    <h2>Day 2: Button Component System</h2>

    <p>Primary Buttons</p>

    <div class="button-group">
      <button class="btn primary">Default</button>
      <button class="btn primary hover-btn">Hover</button>
      <button class="btn primary active-btn">Active</button>
      <button class="btn primary" disabled>Disabled</button>
    </div>
  </section>

</main>

<footer class="footer">
  © 2026 Your Name
</footer>

<script src="script.js"></script>
</body>
</html>
