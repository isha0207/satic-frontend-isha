<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Component System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Your Name</div>
        <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
        <nav class="nav-links" id="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="container">
        <h1>H3 My Frontend Journey</h1>
        <p>Day 1: Setup & Deployment (Completed)</p>

        <section class="component-section">
            <h2>H2 Day 2: Button Component System</h2>
            
            <div class="button-row">
                <p>Primary Buttons</p>
                <div class="btn-group">
                    <button class="btn btn-primary">Default</button>
                    <button class="btn btn-primary hover">Hover</button>
                    <button class="btn btn-primary active">Active</button>
                    <button class="btn btn-primary" disabled>Disabled</button>
                </div>
            </div>

            <div class="button-row">
                <p>Secondary Buttons (Outline)</p>
                <div class="btn-group">
                    <button class="btn btn-secondary">Default</button>
                    <button class="btn btn-secondary hover">Hover</button>
                    <button class="btn btn-secondary active">Active</button>
                    <button class="btn btn-secondary" disabled>Disabled</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Your Name</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
