<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Frontend Journey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">  
</head>

<body>

<header class="header">
  <div class="container nav-container">
    
    <h2 class="logo">Mondal Isha</h2>

    <!-- Hamburger Button -->
    <button class="menu-toggle" id="menuToggle">
      ☰
    </button>

    <!-- Navigation -->
    <nav class="nav" id="navMenu">
      <a href="#">Home</a>
      <a href="#">Tasks</a>
      <a href="#">Journey</a>
      <a href="#">Contact</a>
    </nav>

  </div>
</header>

<main>

  <!-- ✅ Hero Section (Merged Properly) -->
  <section class="hero">
    <div class="hero-content container">
      <h1>Find Your Internship</h1>
      <p>Search opportunities that match your skills</p>

      <form class="search-form" id="searchForm">
        
        <!-- Accessible Label -->
        <label for="searchInput" class="visually-hidden">
          Search internships
        </label>

        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search internships..."
          aria-label="Search internships"
        >

        <button type="submit" class="search-btn">
          🔍
        </button>

      </form>
    </div>
  </section>


  <!-- Frontend Journey -->
  <section class="card container">
    <h3>My Frontend Journey</h3>
    <ul>
      <li>Day 1: Setup & Deployment (Completed)</li>
    </ul>
  </section>


  <!-- Button Component System -->
  <section class="card container">
    <h2>Day 2: Button Component System</h2>

    <p>Primary Buttons</p>

    <div class="button-group">
      <button class="btn primary">Default</button>
      <button class="btn primary hover-btn">Hover</button>
      <button class="btn primary active-btn">Active</button>
      <button class="btn primary" disabled>Disabled</button>
    </div>
  </section>

</main>

<footer class="footer">
  © 2026 Mondal Isha
</footer>

<script src="js/script.js"></script>
</body>
</html>
